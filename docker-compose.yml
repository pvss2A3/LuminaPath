version: '3.8'

services:
  # 1. Centralized Database
  luminapath-db:
    image: postgres:15-alpine
    container_name: luminapath-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    networks:
      - luminapath-network
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d

  # 2. Database Management Tool
  pgadmin:
    image: dpage/pgadmin4
    container_name: luminapath-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}
      # Required to import servers.json automatically
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    networks:
      - luminapath-network
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./init-db/servers.json:/pgadmin4/servers.json
    depends_on:
      - luminapath-db

  # 3. API Gateway
  gateway-service:
    build: ./gateway-service
    container_name: luminapath-gateway
    ports:
      - "8080:8080"
    networks:
      - luminapath-network
    environment:
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - identity-service
      - resource-service

  # 4. Identity Service (Auth)
  identity-service:
    build: ./identity-service
    container_name: luminapath-identity
    ports:
      - "8081:8081"
    networks:
      - luminapath-network
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://luminapath-db:5432/${DB_NAME}?currentSchema=auth_schema
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
    depends_on:
      - luminapath-db

  # 5. Resource Service (Content)
  resource-service:
    build: ./resource-service
    container_name: luminapath-resource
    ports:
      - "8082:8082"
    networks:
      - luminapath-network
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://luminapath-db:5432/${DB_NAME}?currentSchema=resource_schema
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      - luminapath-db

  # 6. Progress Service (Tracking)
  progress-service:
    build: ./progress-service
    container_name: luminapath-progress
    ports:
      - "8083:8083"
    networks:
      - luminapath-network
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://luminapath-db:5432/${DB_NAME}?currentSchema=progress_schema
      - SPRING_DATASOURCE_USERNAME=${DB_USER}
      - SPRING_DATASOURCE_PASSWORD=${DB_PASSWORD}
    depends_on:
      - luminapath-db

  # 7. Frontend UI
  frontend-ui:
    build: ./frontend-ui
    container_name: luminapath-ui
    ports:
      - "3000:80"
    networks:
      - luminapath-network
    depends_on:
      - gateway-service

networks:
  luminapath-network:
    driver: bridge

volumes:
  postgres_data:
  pgadmin_data: